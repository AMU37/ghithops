services:
  - type: web
    name: ghithops-api
    runtime: python
    repo: https://github.com/your-org/ghithops
    plan: free
    region: ohio
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: cd backend && gunicorn ghithops.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile -
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://ghithops-frontend.onrender.com,http://localhost:3000
      - key: FRONTEND_URL
        value: https://ghithops-frontend.onrender.com
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: ghithops-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ghithops-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ghithops-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: ghithops-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ghithops-db
          property: port

  - type: web
    name: ghithops-frontend
    runtime: node
    repo: https://github.com/your-org/ghithops
    plan: free
    region: ohio
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_URL
        sync: false
        value: https://ghithops-api.onrender.com/api

databases:
  - name: ghithops-db
    plan: free
    region: ohio
    databaseName: ghithops
    postgresMajorVersion: 16
